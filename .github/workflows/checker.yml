name: SIAsisten Lowongan Checker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Restore cache file
        continue-on-error: true
        run: echo "Cache akan dibaca dari repo jika ada."

      - name: Run checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SITE_USERNAME:       ${{ secrets.SIASISTEN_USER }}
          SITE_PASSWORD:       ${{ secrets.SIASISTEN_PASS }}
        run: python checker.py

      - name: Commit cache update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_data.json
          git diff --cached --quiet || git commit -m "chore: update cache [skip ci]"
          git push