name: Cek Lowongan SIAsisten

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run checker
      env:
        SIASISTEN_USER: ${{ secrets.SIASISTEN_USER }}
        SIASISTEN_PASS: ${{ secrets.SIASISTEN_PASS }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python main.py

    # OPSIONAL: commit perubahan last.json kembali ke repo
    - name: Commit updates
      if: success()
      run: |
        if [ -f "last.json" ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last.json
          git commit -m "Update last.json" || echo "No changes to commit"
        fi
    - name: Push changes
      if: success()
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
