name: Cek Lowongan SIAsisten

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run checker
      env:
        SIASISTEN_USER: ${{ secrets.SIASISTEN_USER }}
        SIASISTEN_PASS: ${{ secrets.SIASISTEN_PASS }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python main.py
